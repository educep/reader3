<!-- Side Panel: Chat + Notebook (Phase 1 — Notebook tab disabled) -->
<div id="sidePanel" class="side-panel side-panel--closed" aria-label="Assistant panel">
  <div class="sp-header">
    <div class="sp-tabs" role="tablist">
      <button class="sp-tab sp-tab--active" id="tabChat" role="tab" aria-selected="true" aria-controls="chatPane">Chat</button>
      <button class="sp-tab" id="tabNotebook" role="tab" aria-selected="false">Notebook</button>
    </div>
    <button class="sp-close" id="spCloseBtn" aria-label="Close panel">✕</button>
  </div>

  <!-- Chat Pane -->
  <div id="chatPane" class="sp-pane" role="tabpanel" aria-labelledby="tabChat">
    <div id="selectionQuote" class="sp-quote sp-quote--hidden">
      <span class="sp-quote-label">Selected passage</span>
      <blockquote id="selectionQuoteText"></blockquote>
      <button class="sp-quote-clear" id="clearQuoteBtn" aria-label="Clear selection">✕</button>
    </div>
    <div id="messageList" class="sp-messages" aria-live="polite" aria-label="Chat messages"></div>
    <div class="sp-input-row">
      <textarea id="chatInput" class="sp-input" placeholder="Ask a follow-up question… (Enter to send, Shift+Enter for newline)" rows="2"></textarea>
      <button id="chatSubmit" class="sp-submit" aria-label="Send message">→</button>
    </div>
    <div class="sp-footer">
      <button id="newConversationBtn" class="sp-new-convo">New conversation</button>
    </div>
  </div>

  <!-- Notebook Pane -->
  <div id="notebookPane" class="sp-pane sp-pane--hidden" role="tabpanel" aria-labelledby="tabNotebook">
    <!-- Sub-view selector -->
    <div class="nb-subviews" role="tablist">
      <button class="nb-subview-btn nb-subview-btn--active" data-view="scope">Current scope</button>
      <button class="nb-subview-btn" data-view="index">Book index</button>
      <a class="nb-subview-btn" id="digestLink" href="#" target="_blank">Full digest ↗</a>
    </div>

    <!-- Current scope view -->
    <div id="nbViewScope" class="nb-view">
      <div id="nbScopeBreadcrumb" class="nb-breadcrumb"></div>
      <div id="nbEntryList" class="nb-entry-list"></div>
      <button class="nb-add-btn" id="nbAddBtn">+ New entry</button>
    </div>

    <!-- Book index view -->
    <div id="nbViewIndex" class="nb-view nb-view--hidden">
      <div class="nb-filters">
        <select id="nbTypeFilter"><option value="">All types</option>
          <option>note</option><option>summary</option><option>bullets</option>
          <option>diagram</option><option>quote</option><option>question</option>
        </select>
        <select id="nbOriginFilter"><option value="">All origins</option>
          <option>human</option><option>llm</option>
        </select>
      </div>
      <div id="nbIndexList" class="nb-entry-list"></div>
    </div>

    <!-- Entry composer (shown/hidden) -->
    <div id="nbComposer" class="nb-composer nb-composer--hidden">
      <select id="nbTypeSelect">
        <option value="note">Note</option><option value="summary">Summary</option>
        <option value="bullets">Bullets</option><option value="diagram">Diagram (Mermaid)</option>
        <option value="quote">Quote</option><option value="question">Question</option>
      </select>
      <textarea id="nbBodyInput" class="nb-body" placeholder="Write in Markdown…" rows="5"></textarea>
      <div class="nb-composer-actions">
        <button id="nbSaveBtn" class="nb-save-btn">Save entry</button>
        <button id="nbCancelBtn" class="nb-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- Selection Toolbar -->
<div id="selectionToolbar" class="sel-toolbar sel-toolbar--hidden" role="toolbar" aria-label="Text actions">
  <button class="sel-action" data-action="explain">Explain</button>
  <button class="sel-action" data-action="summarize">Summarize</button>
  <button class="sel-action" data-action="translate">Translate</button>
  <button class="sel-action" data-action="discuss">Discuss</button>
</div>
